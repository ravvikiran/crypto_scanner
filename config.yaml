# Crypto Scanner Configuration
# This file provides default configuration values

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/scanner.log"

# Scanner Configuration
scanner:
  scan_interval_minutes: 5
  max_coins_to_scan: 500
  min_market_cap_millions: 10
  min_volume_24h_millions: 1
  min_signal_score: 5.5
  timeframes: ["4h", "daily"]
  
  # PRD: Market Universe - Top 100-300 coins by market cap
  top_coins_by_market_cap: 300
  min_top_coins: 100
  
  # PRD: Risk Management
  max_trades_per_day: 5
  daily_loss_cap: 0.03  # 3%
  
  # Multi-Timeframe Strategy Configuration
  enable_mtf_strategy: true
  mtf_timeframes: ["daily", "1h", "15m"]
  mtf_min_confidence: 5.5
  
  # PRD Signal Engine Configuration
  enable_prd_strategy: true
  prd_timeframes: ["4h", "daily"]
  prd_min_confidence: 55.0

# PRD Data Layer Configuration
data:
  # Primary exchange
  primary_exchange: "binance"
  
  # Fallback exchanges (for when primary fails)
  fallback_exchanges:
    - "bybit"
    - "kucoin"
  
  # Cache TTL per timeframe (seconds)
  cache_ttl:
    "1m": 30
    "5m": 60
    "15m": 120
    "1h": 300
    "4h": 300
    "daily": 600
  
  # Data validation
  validate:
    reject_zero_volume: true
    reject_candle_gaps: true
    reject_abnormal_spikes: true
    spike_threshold_percent: 15

# Scheduler Configuration
scheduler:
  timezone: "Asia/Kolkata"

  # Run mode: "continuous" for 15-min scans 24x7
  run_mode: "continuous"  # Options: "continuous" or "scheduled"
  continuous_interval_minutes: 15  # Scan every 15 minutes in continuous mode

  # Scanner runs 24x7 in continuous mode (market never closes for crypto)
  run_days: [0, 1, 2, 3, 4, 5, 6]  # All days (Mon-Sun)

  # PRD: Multi-Timeframe Scan Intervals
  # 15m scan → every 5 min
  # 4H scan → every 30 min
  # 1D scan → every 2 hours
  mtf_scan_intervals:
    "15m": 5
    "1h": 5
    "4h": 30
    "daily": 120

  # Market hours (9 AM to 12 AM IST - crypto works 24x7)
  market_open_hour: 9
  market_open_minute: 0
  market_close_hour: 23
  market_close_minute: 59

# Signal Intelligence Engine (SIE)
signal_intelligence:
  enabled: true
  monitoring:
    check_interval_minutes: 15

# Learning System
learning:
  enabled: true
  check_interval_minutes: 15
  signal_timeout_days: 7
  min_signals_for_insights: 20
  notify_on_resolution: true

# Strategy PRD Parameters
strategy:
  breakout_volume_multiplier: 1.5
  pullback_rsi_low: 40
  pullback_rsi_high: 55
  min_risk_reward: 2.0
  max_risk_per_trade: 0.02  # 2%

# PRD Rule Engine Weights
rule_engine:
  weights:
    trend: 25
    ema_alignment: 20
    volume: 15
    rsi_position: 10
    pattern: 15
    btc_correlation: 10
    risk_reward: 5
  
  thresholds:
    reject: 60
    weak: 70
    send_to_ai: 70

# Alert Configuration
alerts:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
    channel_chat_id: ""
  
  discord:
    enabled: false
    webhook_url: ""
  
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    username: ""
    password: ""
    from: ""
    to: ""
  
  # Alert settings
  confidence_threshold: 55  # PRD confidence threshold (0-100)
  alert_cooldown_hours: 24  # Avoid duplicate alerts within 24 hours
  max_daily_signals: 5  # Maximum signals to publish per day (long + short combined)

# Momentum Scanner Configuration (WebSocket Streaming)
momentum_scanner:
  # Exchange WebSocket connections
  exchanges:
    binance:
      enabled: true
      ws_url: "wss://stream.binance.com:9443/ws"
    bybit:
      enabled: false
      ws_url: "wss://stream.bybit.com/v5/public/linear"
    okx:
      enabled: false
      ws_url: "wss://ws.okx.com:8443/ws/v5/public"

  # Reconnection settings
  reconnect:
    max_attempts: 5
    initial_delay_seconds: 1.0
    max_delay_seconds: 60.0
    connection_timeout_seconds: 10.0
    stale_data_threshold_seconds: 5.0

  # Streaming configuration
  streaming:
    timeframes: ["4h", "1h", "15m"]
    max_coins: 300

  # Symbols to monitor
  # When universe_manager is active, this is ignored (dynamic fetch from Bybit).
  # When universe_manager fails, the fallback list in main_momentum.py is used.
  # Set MOMENTUM_SYMBOLS env var to override with a custom comma-separated list.
  symbols: []

  # Alert cooldown (Requirement 15.2)
  alert_cooldown:
    default_hours: 4.0
    min_hours: 1.0
    max_hours: 48.0
    max_cache_entries: 500
    volume_override_threshold_pp: 50.0  # percentage points above previous

  # Journal retention (Requirement 17.7)
  journal:
    retention_days: 90
    storage_path: "data/journal/"

  # Event processing
  event_processing:
    queue_max_size: 10000
    max_concurrent_updates: 50

  # Setup detection parameters
  setup_detection:
    compression:
      min_candles: 3
      max_candles: 8
      atr_threshold: 0.75  # 75% of ATR14
      expiry_candles: 12
    breakout:
      volume_multiplier: 1.5
      close_position_min: 0.33  # upper 33%
    pullback:
      ema_proximity_pct: 0.5  # within 0.5% of EMA
      invalidation_pct: 1.0  # below EMA by 1%
    entry_confirmation:
      timeframe: "15m"
      max_candles: 4  # 1 hour window

  # Scoring weights (deterministic, no AI)
  scoring:
    weights:
      relative_strength: 0.30
      relative_volume: 0.25
      breakout_quality: 0.20
      trend_quality: 0.15
      market_alignment: 0.10
    min_risk_reward: 2.0
    rvol_normalization:
      min_for_0: 1.0
      max_for_100: 3.0
    oi_adjustments:
      overcrowded_penalty: 0.20
      weak_oi_penalty: 0.15
      funding_extreme_threshold: 0.1  # %
      oi_increase_threshold: 5.0  # %

  # Dynamic Universe Management
  universe:
    refresh_minutes: 60          # How often to refresh the universe list
    min_volume_usd: 50000000     # Minimum 24h volume in USD (50M)
    min_price: 0.10              # Minimum price in USD

  # Per-Coin ATR Volatility Gate
  volatility_gate:
    min_pct: 1.5                 # Minimum ATR14/price ratio (%) - reject dead coins
    max_pct: 8.0                 # Maximum ATR14/price ratio (%) - reject pump coins

  # BTC Crash Detection (Relaxed Regime Filter)
  btc_crash_detection:
    threshold_pct: 3.0           # BTC decline threshold (%) across candle window
    candle_count: 4              # Number of 1H candles to evaluate for crash

  # Trailing Stop Configuration
  trailing_stop:
    t1_action: "breakeven"       # Move stop to entry when T1 is hit
    t2_trail_pct: 1.0            # Trail 1% below highest price after T2
    monitor_timeframe: "15m"     # Candle timeframe for monitoring
    no_data_warning_minutes: 30  # Warn if no data received for this duration
