# Crypto Scanner Configuration
# This file provides default configuration values

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/scanner.log"

# Scanner Configuration
scanner:
  scan_interval_minutes: 5
  max_coins_to_scan: 500
  min_market_cap_millions: 10
  min_volume_24h_millions: 1
  min_signal_score: 7.0
  timeframes: ["4h", "daily"]
  
  # PRD: Market Universe - Top 100-300 coins by market cap
  top_coins_by_market_cap: 300
  min_top_coins: 100
  
  # PRD: Risk Management
  max_trades_per_day: 5
  daily_loss_cap: 0.03  # 3%
  
  # Multi-Timeframe Strategy Configuration
  enable_mtf_strategy: true
  mtf_timeframes: ["daily", "1h", "15m"]
  mtf_min_confidence: 7.0
  
  # PRD Signal Engine Configuration
  enable_prd_strategy: true
  prd_timeframes: ["4h", "daily"]
  prd_min_confidence: 70.0

# PRD Data Layer Configuration
data:
  # Primary exchange
  primary_exchange: "binance"
  
  # Fallback exchanges (for when primary fails)
  fallback_exchanges:
    - "bybit"
    - "kucoin"
  
  # Cache TTL per timeframe (seconds)
  cache_ttl:
    "1m": 30
    "5m": 60
    "15m": 120
    "1h": 300
    "4h": 300
    "daily": 600
  
  # Data validation
  validate:
    reject_zero_volume: true
    reject_candle_gaps: true
    reject_abnormal_spikes: true
    spike_threshold_percent: 15

# Scheduler Configuration
scheduler:
  timezone: "Asia/Kolkata"

  # Run mode: "continuous" for 15-min scans, "scheduled" for daily scan at specific time
  run_mode: "continuous"  # Options: "continuous" or "scheduled"
  continuous_interval_minutes: 15  # Scan every 15 minutes in continuous mode

  # Run daily at 3:00 PM IST (only used when run_mode is "scheduled")
  scan_time_hour: 15
  scan_time_minute: 0

  run_days: [1, 2, 3, 4, 5]  # Monday to Friday

  # PRD: Multi-Timeframe Scan Intervals
  # 15m scan → every 5 min
  # 4H scan → every 30 min
  # 1D scan → every 2 hours
  mtf_scan_intervals:
    "15m": 5
    "1h": 5
    "4h": 30
    "daily": 120

  # Market hours (for crypto, you might adjust these)
  market_open_hour: 9
  market_open_minute: 15
  market_close_hour: 15
  market_close_minute: 30

# Signal Intelligence Engine (SIE)
signal_intelligence:
  enabled: true
  monitoring:
    check_interval_minutes: 15

# Learning System
learning:
  enabled: true
  check_interval_minutes: 15
  signal_timeout_days: 7
  min_signals_for_insights: 20
  notify_on_resolution: true

# Strategy PRD Parameters
strategy:
  breakout_volume_multiplier: 1.5
  pullback_rsi_low: 40
  pullback_rsi_high: 55
  min_risk_reward: 2.0
  max_risk_per_trade: 0.02  # 2%

# PRD Rule Engine Weights
rule_engine:
  weights:
    trend: 25
    ema_alignment: 20
    volume: 15
    rsi_position: 10
    pattern: 15
    btc_correlation: 10
    risk_reward: 5
  
  thresholds:
    reject: 60
    weak: 70
    send_to_ai: 70

# Alert Configuration
alerts:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
    channel_chat_id: ""
  
  discord:
    enabled: false
    webhook_url: ""
  
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    username: ""
    password: ""
    from: ""
    to: ""
  
  # Alert settings
  confidence_threshold: 70  # PRD confidence threshold (0-100)
  alert_cooldown_hours: 24  # Avoid duplicate alerts within 24 hours
  max_daily_signals: 3  # Maximum signals to publish per day (long + short combined)
